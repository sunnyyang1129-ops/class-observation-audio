<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>專家教師觀課錄音問卷</title>
<style>
  :root{
    --ink:#22303f;
    --ink-soft:#5c6c7a;
    --paper:#f6f5f1;
    --panel:#ffffff;
    --line:#dcdbd4;
    --accent:#3e6259;
    --accent-soft:#e7efec;
    --record:#a8443a;
    --record-soft:#f6e6e3;
    --ok:#3e6259;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    line-height:1.6;
    padding-bottom:80px;
  }
  header{
    background:var(--ink);
    color:#fff;
    padding:20px 18px 24px;
  }
  header h1{
    margin:0 0 4px;
    font-size:1.25rem;
    font-weight:700;
    letter-spacing:.02em;
  }
  header p{
    margin:0;
    font-size:.85rem;
    color:#c7d0d6;
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 16px;}
  .gate{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
    margin-top:-14px;
    box-shadow:0 6px 18px rgba(34,48,63,.08);
  }
  .gate label{
    display:block;
    font-size:.85rem;
    font-weight:600;
    margin-bottom:6px;
    color:var(--ink-soft);
  }
  .gate input{
    width:100%;
    padding:12px 14px;
    font-size:1rem;
    border:1px solid var(--line);
    border-radius:8px;
    background:#fbfbf9;
  }
  .gate button{
    margin-top:12px;
    width:100%;
    padding:13px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
  }
  .gate .hint{font-size:.78rem;color:var(--ink-soft);margin-top:8px;}

  #app{display:none;}

  .progress-bar{
    position:sticky;top:0;z-index:5;
    background:var(--paper);
    padding:10px 16px 8px;
    border-bottom:1px solid var(--line);
  }
  .progress-bar .track{
    height:6px;background:var(--line);border-radius:3px;overflow:hidden;
  }
  .progress-bar .fill{height:100%;background:var(--accent);width:0%;transition:width .3s;}
  .progress-bar .label{font-size:.72rem;color:var(--ink-soft);margin-top:4px;}

  .section-title{
    margin:26px 0 10px;
    font-size:1rem;
    font-weight:700;
    color:var(--accent);
    padding-bottom:6px;
    border-bottom:2px solid var(--accent-soft);
  }

  .qcard{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px;
    margin-bottom:14px;
    position:relative;
  }
  .qcard.done{border-color:var(--ok);}
  .qnum{
    font-size:.72rem;
    font-weight:700;
    color:var(--ink-soft);
    letter-spacing:.05em;
    text-transform:uppercase;
  }
  .qtext{
    font-size:.98rem;
    font-weight:600;
    margin:4px 0 12px;
    color:var(--ink);
  }
  .status-chip{
    position:absolute;top:14px;right:14px;
    font-size:.7rem;
    padding:2px 8px;
    border-radius:20px;
    background:var(--accent-soft);
    color:var(--accent);
    font-weight:700;
    display:none;
  }
  .status-chip.show{display:inline-block;}

  textarea{
    width:100%;
    min-height:80px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:.92rem;
    font-family:inherit;
    resize:vertical;
    background:#fbfbf9;
    color:var(--ink);
  }

  .controls{
    display:flex;
    gap:8px;
    margin-top:10px;
    flex-wrap:wrap;
    align-items:center;
  }
  .rec-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:9px 14px;
    border-radius:20px;
    border:1px solid var(--record);
    background:var(--record-soft);
    color:var(--record);
    font-weight:700;
    font-size:.85rem;
    cursor:pointer;
  }
  .rec-btn.active{
    background:var(--record);
    color:#fff;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;background:var(--record);
    display:inline-block;
  }
  .rec-btn.active .dot{background:#fff;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  .send-btn{
    padding:9px 16px;
    border-radius:20px;
    border:1px solid var(--accent);
    background:var(--accent);
    color:#fff;
    font-weight:700;
    font-size:.85rem;
    cursor:pointer;
  }
  .send-btn:disabled{opacity:.5;cursor:default;}

  audio{
    display:block;
    width:100%;
    margin-top:10px;
    height:34px;
  }
  .rec-time{font-size:.8rem;color:var(--record);font-weight:700;min-width:44px;}

  footer.note{
    max-width:640px;margin:20px auto 40px;padding:0 16px;
    font-size:.75rem;color:var(--ink-soft);
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>專家教師觀課錄音問卷</h1>
    <p>詳答題可直接說話錄音，系統會自動轉出文字草稿；也可以直接打字回答。</p>
  </div>
</header>

<div class="wrap">
  <div class="gate" id="gate">
    <label for="codeInput">請輸入您的填答代碼</label>
    <input type="text" id="codeInput" placeholder="例如：專家A、EXP01">
    <button onclick="startSession()">開始填答</button>
    <div class="hint">代碼由主辦單位提供，用來對應您這份紀錄，請勿使用真實姓名。</div>
  </div>
</div>

<div id="app">
  <div class="progress-bar">
    <div class="wrap" style="padding:0;">
      <div class="track"><div class="fill" id="progressFill"></div></div>
      <div class="label" id="progressLabel">已完成 0 / 19 題</div>
    </div>
  </div>

  <div class="wrap" id="questionArea"></div>

  <div class="wrap">
    <div id="doneBanner" style="display:none;margin:20px 0;padding:16px;background:var(--accent-soft);border:1px solid var(--accent);border-radius:12px;text-align:center;font-weight:700;color:var(--accent);">
      🎉 全部題目已送出，感謝您的填答，可以關閉此頁面了。
    </div>
  </div>

  <footer class="note">
    每一題按「送出這一題」後即會上傳，若中途離開頁面，已送出的題目不會遺失。若瀏覽器不支援語音即時辨識（建議使用手機或電腦版 Chrome），仍可正常錄音，之後由研究團隊另行轉錄。
  </footer>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx9rjiabdFWGZsJKc2yBUW3M3nKfC8pmk79JZ_eU38h5Z6eWky2LussDpUFx_9zTL4w/exec";

const QUESTIONS = [
  {section:"課前準備", id:"1", text:"授課住院醫師說明該教學活動的目標、使用的教材、教學方法等"},
  {section:"課前準備", id:"2", text:"觀課前共識內容"},

  {section:"觀察表一：學員課程表現及對於課程的專注度等觀察紀錄", id:"1", text:"學員到課及遲到（或早退）情形如何？"},
  {section:"觀察表一：學員課程表現及對於課程的專注度等觀察紀錄", id:"2", text:"學員投入課堂學習的程度如何？（如參與討論度、提問頻率、與同儕互動情形等）"},
  {section:"觀察表一：學員課程表現及對於課程的專注度等觀察紀錄", id:"3", text:"小組內互動情形如何？（討論的頻率、互動內容以及互動方式等）"},
  {section:"觀察表一：學員課程表現及對於課程的專注度等觀察紀錄", id:"4", text:"內容是否聚焦課程主題？"},
  {section:"觀察表一：學員課程表現及對於課程的專注度等觀察紀錄", id:"5", text:"學員對哪個部分感到興趣？"},
  {section:"觀察表一：學員課程表現及對於課程的專注度等觀察紀錄", id:"6", text:"學員對哪個部分較無法理解？"},
  {section:"觀察表一：學員課程表現及對於課程的專注度等觀察紀錄", id:"7", text:"其他觀察"},

  {section:"觀察表二：特別教學行為與學習行為的觀察（如遊戲化教學、科技輔助教學等）", id:"1", text:"教學主題"},
  {section:"觀察表二：特別教學行為與學習行為的觀察（如遊戲化教學、科技輔助教學等）", id:"2", text:"教師教學行為"},
  {section:"觀察表二：特別教學行為與學習行為的觀察（如遊戲化教學、科技輔助教學等）", id:"3", text:"學員的反應"},
  {section:"觀察表二：特別教學行為與學習行為的觀察（如遊戲化教學、科技輔助教學等）", id:"4", text:"學員的學習行為"},
  {section:"觀察表二：特別教學行為與學習行為的觀察（如遊戲化教學、科技輔助教學等）", id:"5", text:"您的觀察紀錄"},

  {section:"觀察後回饋", id:"1", text:"欣賞課程哪些優點？"},
  {section:"觀察後回饋", id:"2", text:"有哪方面可以改善與其建議？"},
  {section:"觀察後回饋", id:"3", text:"分享觀課的心得或收穫？"},
  {section:"觀察後回饋", id:"4", text:"問題提問"}
];

let respondentCode = "";
let completedCount = 0;

function startSession(){
  const val = document.getElementById('codeInput').value.trim();
  if(!val){
    alert("請先輸入填答代碼");
    return;
  }
  respondentCode = val;
  sessionStarted = true;
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderQuestions();
}

function renderQuestions(){
  const area = document.getElementById('questionArea');
  let lastSection = null;
  let html = "";
  QUESTIONS.forEach((q, idx) => {
    if(q.section !== lastSection){
      html += `<div class="section-title">${q.section}</div>`;
      lastSection = q.section;
    }
    html += `
    <div class="qcard" id="qcard-${idx}">
      <div class="status-chip" id="chip-${idx}">已送出</div>
      <div class="qnum">第 ${idx+1} 題 / 共 ${QUESTIONS.length} 題</div>
      <div class="qtext">${q.text}</div>
      <textarea id="text-${idx}" placeholder="可直接打字，或按下方按鈕開始錄音自動產生文字草稿"></textarea>
      <div class="controls">
        <button class="rec-btn" id="recbtn-${idx}" onclick="toggleRecord(${idx})">
          <span class="dot"></span><span id="recbtn-label-${idx}">開始錄音</span>
        </button>
        <span class="rec-time" id="rectime-${idx}"></span>
        <button class="send-btn" id="sendbtn-${idx}" onclick="sendAnswer(${idx})">送出這一題</button>
      </div>
      <audio id="audio-${idx}" controls style="display:none;"></audio>
    </div>`;
  });
  area.innerHTML = html;
}

// ---- recording state per question ----
const recState = {};

function getRecognitionClass(){
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}

async function toggleRecord(idx){
  if(!recState[idx]) recState[idx] = {recording:false};
  const st = recState[idx];

  if(!st.recording){
    // start
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      st.stream = stream;
      st.chunks = [];

      // 依瀏覽器實際支援的格式錄音（iPhone/Safari 跟電腦版 Chrome 支援的格式不同，
      // 之前寫死 audio/webm 會導致 iPhone 錄出來的檔案跟標記的格式對不上，播放時顯示錯誤）
      const mimeCandidates = ['audio/mp4','audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus'];
      let chosenMime = '';
      for(const m of mimeCandidates){
        if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)){
          chosenMime = m; break;
        }
      }
      const extMap = {'audio/mp4':'m4a','audio/webm':'webm','audio/ogg':'ogg'};
      const baseMime = chosenMime.split(';')[0];
      st.mimeType = chosenMime || 'audio/webm';
      st.fileExt = extMap[baseMime] || 'webm';

      st.mediaRecorder = chosenMime ? new MediaRecorder(stream,{mimeType:chosenMime}) : new MediaRecorder(stream);
      st.mediaRecorder.ondataavailable = e => { if(e.data.size>0) st.chunks.push(e.data); };
      st.mediaRecorder.onstop = () => {
        const blob = new Blob(st.chunks, {type: st.mimeType});
        st.audioBlob = blob;
        const audioEl = document.getElementById('audio-'+idx);
        audioEl.src = URL.createObjectURL(blob);
        audioEl.style.display = 'block';
        stream.getTracks().forEach(t=>t.stop());
      };
      st.mediaRecorder.start();

      const RecClass = getRecognitionClass();
      if(RecClass){
        st.recognition = new RecClass();
        st.recognition.lang = 'zh-TW';
        st.recognition.continuous = true;
        st.recognition.interimResults = true;
        st.baseText = document.getElementById('text-'+idx).value;
        if(st.baseText) st.baseText += " ";
        st.recognition.onresult = (e) => {
          let finalT = "";
          let interimT = "";
          for(let i=0;i<e.results.length;i++){
            if(e.results[i].isFinal) finalT += e.results[i][0].transcript;
            else interimT += e.results[i][0].transcript;
          }
          document.getElementById('text-'+idx).value = st.baseText + finalT + interimT;
        };
        st.recognition.onerror = () => {};
        st.recognition.start();
      }

      st.recording = true;
      st.startTime = Date.now();
      st.timerInt = setInterval(()=>{
        const sec = Math.floor((Date.now()-st.startTime)/1000);
        const m = String(Math.floor(sec/60)).padStart(2,'0');
        const s = String(sec%60).padStart(2,'0');
        document.getElementById('rectime-'+idx).textContent = m+':'+s;
      },500);

      document.getElementById('recbtn-'+idx).classList.add('active');
      document.getElementById('recbtn-label-'+idx).textContent = "停止錄音";
    }catch(err){
      alert("無法使用麥克風，請確認已允許瀏覽器存取麥克風權限。");
    }
  } else {
    // stop
    document.getElementById('recbtn-'+idx).classList.remove('active');
    document.getElementById('recbtn-label-'+idx).textContent = "處理錄音中...";
    document.getElementById('recbtn-'+idx).disabled = true;
    document.getElementById('sendbtn-'+idx).disabled = true;

    if(st.recognition) st.recognition.stop();
    clearInterval(st.timerInt);
    st.recording = false;

    await new Promise(resolve => {
      if(st.mediaRecorder && st.mediaRecorder.state !== 'inactive'){
        st.mediaRecorder.addEventListener('stop', resolve, {once:true});
        st.mediaRecorder.stop();
      } else {
        resolve();
      }
    });

    document.getElementById('recbtn-'+idx).disabled = false;
    document.getElementById('sendbtn-'+idx).disabled = false;
    document.getElementById('recbtn-label-'+idx).textContent = "重新錄音";
  }
}

function blobToBase64(blob){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

async function sendAnswer(idx){
  const q = QUESTIONS[idx];
  const text = document.getElementById('text-'+idx).value.trim();
  const st = recState[idx] || {};

  if(st.recording){
    alert("請先按「停止錄音」，再送出這一題。");
    return;
  }

  const btn = document.getElementById('sendbtn-'+idx);
  btn.disabled = true;
  btn.textContent = "送出中...";

  const formData = new FormData();
  formData.append('respondentCode', respondentCode);
  formData.append('section', q.section);
  formData.append('questionId', q.id);
  formData.append('questionText', q.text);
  formData.append('transcriptText', text);
  const hasAudio = !!st.audioBlob;
  if(hasAudio){
    try{
      const base64 = await blobToBase64(st.audioBlob);
      formData.append('audioBase64', base64);
      formData.append('audioMime', st.mimeType || 'audio/webm');
      formData.append('audioExt', st.fileExt || 'webm');
    }catch(err){
      alert("錄音檔處理失敗，請重新錄音後再試一次。");
      btn.disabled = false;
      btn.textContent = "送出這一題";
      return;
    }
  }

  try{
    await fetch(APPS_SCRIPT_URL, {
      method:'POST',
      mode:'no-cors',
      body: formData
    });
    const card = document.getElementById('qcard-'+idx);
    if(!card.classList.contains('done')){
      card.classList.add('done');
      completedCount++;
      updateProgress();
    }
    document.getElementById('chip-'+idx).classList.add('show');
    btn.textContent = hasAudio ? "已送出（含錄音檔），可再次修改送出" : "已送出（僅文字），可再次修改送出";
  }catch(err){
    alert("送出失敗，請檢查網路連線後再試一次。");
    btn.textContent = "送出這一題";
  }
  btn.disabled = false;
}

function updateProgress(){
  const pct = Math.round((completedCount/QUESTIONS.length)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `已完成 ${completedCount} / ${QUESTIONS.length} 題`;
  if(completedCount >= QUESTIONS.length){
    document.getElementById('doneBanner').style.display = 'block';
  }
}

let sessionStarted = false;
window.addEventListener('beforeunload', function(e){
  if(sessionStarted && completedCount < QUESTIONS.length){
    e.preventDefault();
    e.returnValue = '';
  }
});
</script>

</body>
</html>
